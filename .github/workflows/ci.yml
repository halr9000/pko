name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Weekly vendor-staleness check, independent of code changes — catches
    # upstream drift even when nobody touches pko for a while.
    - cron: "0 9 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync
      - name: Run unit tests
        run: uv run pytest tests/ -v -m "not integration"

  vendor-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Check vendored upstream files are current
        run: uv run python scripts/sync_vendor.py --check
